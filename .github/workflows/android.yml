

name: Aladdin Flutter Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # ریپوزٹری کلون کرنا
      - name: Checkout repository
        uses: actions/checkout@v4

      # JDK انسٹال کرنا
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Flutter انسٹال کرنا
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      # Dependencies انسٹال کرنا
      - name: Install dependencies
        run: flutter pub get

      # APK build کرنا
      - name: Build APK
        run: flutter build apk --release

      # AAB build کرنا
      - name: Build AAB
        run: flutter build appbundle --release

      # APK artifact upload کرنا
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Aladdin-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      # AAB artifact upload کرنا
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: Aladdin-App-AAB
          path: build/app/outputs/bundle/release/app-release.aab

  build-ios:
    runs-on: macos-latest
    needs: build-android

    steps:
      # ریپوزٹری کلون کرنا
      - name: Checkout repository
        uses: actions/checkout@v4

      # Flutter انسٹال کرنا
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      # Dependencies انسٹال کرنا
      - name: Install dependencies
        run: flutter pub get

      # iOS build کرنا (Simulator کے لیے)
      - name: Build iOS
        run: flutter build ios --release --no-codesign

      # iOS artifact upload کرنا
      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: Aladdin-App-iOS
          path: build/ios/iphoneos


