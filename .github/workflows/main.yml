name: Flutter APK Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        architecture: 'x64'
        cache: true

    - name: Fix Gradle Compatibility
      run: |
        # Gradle wrapper properties بنائیں یا update کریں
        mkdir -p android/gradle/wrapper
        cat > android/gradle/wrapper/gradle-wrapper.properties << EOL
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-all.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOL

        # Build.gradle میں version تبدیل کریں
        sed -i 's/classpath.*gradle:7.[0-9.]*/classpath '\''com.android.tools.build:gradle:7.3.0'\''/g' android/build.gradle

    - name: Set version properties
      run: |
        cd android
        echo "flutter.versionCode=1" >> local.properties
        echo "flutter.versionName=1.0.0" >> local.properties
        cd ..

    - name: Accept Android licenses
      run: yes | flutter doctor --android-licenses

    - name: Clean previous builds
      run: flutter clean

    - name: Get dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --release --no-android-gradle-daemon

    - name: List build output files
      run: ls -la build/app/outputs/flutter-apk/

    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
