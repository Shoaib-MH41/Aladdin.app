name: Flutter APK Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        architecture: 'x64'
        cache: true

    - name: Accept Android licenses
      run: yes | flutter doctor --android-licenses

    - name: Clean previous builds
      run: flutter clean

    - name: Get dependencies
      run: flutter pub get

    - name: Check Flutter doctor
      run: flutter doctor -v

    - name: Build APK
      run: flutter build apk --release

    - name: List build output files
      run: ls -la build/app/outputs/flutter-apk/

    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
- name: Fix Gradle Compatibility
  run: |
    # پہلے چیک کریں کہ فائل exists ہے
    if [ -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
      sed -i 's/gradle-8.0-all.zip/gradle-7.5-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties
    else
      # اگر فائل نہیں ہے تو بنائیں
      mkdir -p android/gradle/wrapper
      echo 'distributionBase=GRADLE_USER_HOME' > android/gradle/wrapper/gradle-wrapper.properties
      echo 'distributionPath=wrapper/dists' >> android/gradle/wrapper/gradle-wrapper.properties
      echo 'distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-all.zip' >> android/gradle/wrapper/gradle-wrapper.properties
      echo 'zipStoreBase=GRADLE_USER_HOME' >> android/gradle/wrapper/gradle-wrapper.properties
      echo 'zipStorePath=wrapper/dists' >> android/gradle/wrapper/gradle-wrapper.properties
    fi
    
    # build.gradle update کریں
    sed -i 's/classpath.*gradle:7.5.1/classpath '\''com.android.tools.build:gradle:7.3.0'\''/g' android/build.gradle
