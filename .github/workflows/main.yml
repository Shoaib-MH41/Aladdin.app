
name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    if: false  # فی الحال disable ہے، جب ٹھیک ہو جائے تو اسے ہٹا دیں
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.10.5'  # مناسب Flutter version دیں

    - name: Install dependencies
      run: flutter pub get

    - name: Analyze Code
      run: flutter analyze

    - name: Build APK
      run: flutter build apk --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
