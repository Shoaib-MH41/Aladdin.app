
name: Aladdin Flutter Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ریپوزٹری کلون کرنا
      - name: Checkout repository
        uses: actions/checkout@v3

      # JDK انسٹال کرنا
      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Flutter انسٹال کرنا
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'   # تازہ ترین stable ورژن

      # Dependencies انسٹال کرنا
      - name: Install dependencies
        run: flutter pub get

      # کوڈ چیک (optional)
      - name: Analyze project
        run: flutter analyze

      # APK build کرنا
      - name: Build APK
        run: flutter build apk --release

      # APK کو artifact کے طور پر upload کرنا
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Aladdin-App
          path: build/app/outputs/flutter-apk/app-release.apk



on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'   # آپ کے Flutter کی version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test

