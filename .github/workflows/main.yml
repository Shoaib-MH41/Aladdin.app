
name: Aladdin Flutter Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ریپوزٹری کلون کرنا
      - name: Checkout repository
        uses: actions/checkout@v4

      # موجودہ ڈائریکٹری دکھانا
      - name: Show current directory
        run: pwd

      # روٹ فولڈر کے فائلز دکھانا
      - name: List root folder files
        run: ls -la

      # 3 لیول تک سب فولڈر دکھانا (lib کہاں ہے پتا کرنے کے لیے)
      - name: Find all folders
        run: find . -maxdepth 3

      # JDK انسٹال کرنا
      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Flutter انسٹال کرنا
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      # Dependencies انسٹال کرنا
      - name: Install dependencies
        run: flutter pub get

      # APK build کرنا (default lib/main.dart پر)
      - name: Build APK
        run: flutter build apk --release

      # Build کو artifact کے طور پر محفوظ کرنا
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Aladdin-App
          path: build/app/outputs/flutter-apk/app-release.apk

